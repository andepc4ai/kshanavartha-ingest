name: KshanaVartha — RSS Ingest (Public)

on:
  # ── Scheduling note ────────────────────────────────────────────────────────
  # GitHub's built-in schedule trigger is unreliable on low-activity public
  # repos — it silently delays or skips runs. We use cron-job.org (free) to
  # POST to the GitHub workflow_dispatch API every 30 minutes instead:
  #
  #   URL:    https://api.github.com/repos/andepc4ai/kshanavartha-ingest/actions/workflows/ingest.yml/dispatches
  #   Method: POST
  #   Headers: Authorization: Bearer <classic PAT with 'workflow' scope>
  #            Accept: application/vnd.github+json
  #            Content-Type: application/json
  #   Body:   {"ref": "main"}
  #
  # This gives reliable 30-min cadence (48 runs/day) without burning GitHub
  # Actions cron quota. Manual trigger from the Actions tab also works.
  # ──────────────────────────────────────────────────────────────────────────
  workflow_dispatch: {}   # triggered by cron-job.org every 30 min + manual

concurrency:
  group: kv-ingest
  cancel-in-progress: false  # never interrupt a running ingest

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Category classifier ─────────────────────────────────────────────
      # Train the sklearn TF-IDF + LogisticRegression classifier once per
      # calendar day using articles.json from R2 as training data.
      # Cached by date so the 48 daily runs only train once (~25s each day).
      # If the cache hit or training succeeds, category_model.pkl is present
      # and ingest.py picks it up automatically. If training fails for any
      # reason, ingest gracefully falls back to keyword detection.
      - name: Set training date key
        run: echo "TRAIN_DATE=$(date -u '+%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Restore cached models
        id: cache-model
        uses: actions/cache@v4
        with:
          path: |
            category_model.pkl
            level_model.pkl
          key: kv-models-${{ env.TRAIN_DATE }}

      - name: Train category classifier
        if: steps.cache-model.outputs.cache-hit != 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set +e   # training failure must not abort the ingest run
          # Download the compact 30-day training store (~2.6 MB vs 29 MB articles.json)
          python - <<'PYEOF'
          import boto3, os, sys
          from botocore.config import Config
          from botocore.exceptions import ClientError
          try:
              client = boto3.client(
                  "s3",
                  endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
                  aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
                  aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
                  config=Config(signature_version="s3v4"),
                  region_name="auto",
              )
              resp = client.get_object(Bucket="kv-audio", Key="training_data.jsonl")
              body = resp["Body"].read()
              with open("/tmp/training_data.jsonl", "wb") as f:
                  f.write(body)
              n = sum(1 for l in body.decode("utf-8").splitlines() if l.strip())
              print(f"Downloaded training_data.jsonl ({n} entries, {len(body)//1024} KB)")
          except ClientError as e:
              if e.response["Error"]["Code"] in ("NoSuchKey", "404"):
                  print("training_data.jsonl not on R2 yet — first run or bootstrap pending", file=sys.stderr)
              else:
                  print(f"WARNING: could not download training_data.jsonl: {e}", file=sys.stderr)
              sys.exit(0)   # non-fatal — ingest will use keyword fallback
          except Exception as e:
              print(f"WARNING: could not download training_data.jsonl: {e}", file=sys.stderr)
              sys.exit(0)
          PYEOF
          if [ -f /tmp/training_data.jsonl ]; then
            python train_categorizer.py \
              --training-data /tmp/training_data.jsonl \
              --model category_model.pkl \
              --level-model level_model.pkl \
            && echo "Category + level classifiers trained OK" \
            || echo "WARNING: training failed — ingest will use keyword fallback"
          fi

      - name: Run ingest
        env:
          # ── AI engines (priority: Cerebras → Gemini → SambaNova) ────────
          # Cerebras — PRIMARY engine. gpt-oss-120b, strong Telugu, generous
          # free tier. Comma-separated for multi-key rotation.
          CEREBRAS_API_KEYS: ${{ secrets.CEREBRAS_API_KEYS }}
          # Gemini Flash — secondary. ~200 RPD per key, rotates on 429.
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # SambaNova — fallback of last resort. Llama 3.3 70B, free tier.
          SAMBANOVA_API_KEYS: ${{ secrets.SAMBANOVA_API_KEYS }}
          # ── Firebase + R2 ───────────────────────────────────────────────
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Cloudflare R2 (articles.json, feed.json, audio MP3s).
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          # ── FCM push notifications ───────────────────────────────────────
          # Set to "1" when device tokens are registered. Leave empty to skip.
          FCM_ENABLED: ${{ secrets.FCM_ENABLED }}
          # ── Non-sensitive tuning (GitHub Variables, not Secrets) ─────────
          # All have safe defaults in code — only set these to override.
          FIRESTORE_DB_ID: ${{ vars.FIRESTORE_DB_ID }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_CALL_DELAY_S: ${{ vars.GEMINI_CALL_DELAY_S }}
          MAX_PER_FEED: ${{ vars.MAX_PER_FEED }}
          MAX_PER_VIDEO_FEED: ${{ vars.MAX_PER_VIDEO_FEED }}
          MAX_TOTAL_GEMINI: ${{ vars.MAX_TOTAL_GEMINI }}
          RETENTION_DAYS: ${{ vars.RETENTION_DAYS }}
          AUDIO_MAX_PER_RUN: ${{ vars.AUDIO_MAX_PER_RUN }}
          FEED_MAX: ${{ vars.FEED_MAX }}
          CINEMA_MAX: ${{ vars.CINEMA_MAX }}
          POLITICS_MAX: ${{ vars.POLITICS_MAX }}
          FARMING_MAX: ${{ vars.FARMING_MAX }}
          SPORTS_MAX: ${{ vars.SPORTS_MAX }}
          NOTIFICATION_GAP_HOURS: ${{ vars.NOTIFICATION_GAP_HOURS }}
          CEREBRAS_CALL_DELAY_S: ${{ vars.CEREBRAS_CALL_DELAY_S }}
          SAMBANOVA_CALL_DELAY_S: ${{ vars.SAMBANOVA_CALL_DELAY_S }}
          # ── Optional / advanced ──────────────────────────────────────────
          # GNEWS_RESOLVE_MAX: max Google News links to resolve per run (default 30)
          GNEWS_RESOLVE_MAX: ${{ vars.GNEWS_RESOLVE_MAX }}
          # Level-based AI quota caps. Local news (village/mandal/district) is
          # uncapped; state + national are capped to preserve quota for local stories.
          # 0 = no cap. Override with GitHub Variables to tune without a deploy.
          NATIONAL_AI_MAX: ${{ vars.NATIONAL_AI_MAX }}
          STATE_AI_MAX: ${{ vars.STATE_AI_MAX }}
          # DATA_GOV_API_KEY: data.gov.in key for mandi (source dead — future use)
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        shell: bash
        run: |
          set -o pipefail
          python ingest.py 2>&1 | tee /tmp/ingest_output.txt

      - name: Prepare email body
        if: always()
        shell: bash
        run: |
          FULL_LOG=$(cat /tmp/ingest_output.txt 2>/dev/null || echo "(no output captured — ingest step did not start)")
          # Extract the structured run summary block (between the === lines)
          SUMMARY=$(echo "$FULL_LOG" | awk '/^={10}/{p=!p; print; next} p{print}' | head -80)
          # Last 400 lines of raw log for full diagnostics
          RAW_LOG=$(echo "$FULL_LOG" | tail -400)
          {
            echo "EMAIL_BODY<<KV_EOF"
            echo "KshanaVartha Ingest — Run #${{ github.run_number }}"
            echo "Status  : ${{ job.status }}"
            echo "Time    : $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "Details : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            if [ -n "$SUMMARY" ]; then
              echo "$SUMMARY"
            fi
            echo ""
            echo "=== Full Log (last 400 lines) ==="
            echo "$RAW_LOG"
            echo "KV_EOF"
          } >> "$GITHUB_ENV"

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: kshanavartha@gmail.com
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "KshanaVartha Ingest #${{ github.run_number }} — ${{ job.status }}"
          to: kshanavartha@gmail.com
          from: KshanaVartha Ingest <kshanavartha@gmail.com>
          body: ${{ env.EMAIL_BODY }}
